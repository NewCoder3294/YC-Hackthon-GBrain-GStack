name: Bug report
description: Report a reproducible bug
title: "[bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug. Please fill in as much detail as you can.
        For security issues, see SECURITY.md — do not file a public issue.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
      placeholder: When I click X, Y happens, but Z should happen.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: A minimal sequence of steps that reliably triggers the bug.
      placeholder: |
        1. Go to /map
        2. Click on camera marker
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: true

  - type: input
    id: commit
    attributes:
      label: Commit / version
      description: Output of `git rev-parse HEAD` or the deployed version.
      placeholder: e.g. 239fe5d
    validations:
      required: false

  - type: dropdown
    id: surface
    attributes:
      label: Surface
      description: Which part of the app?
      options:
        - apps/web (operator)
        - apps/web (citizen)
        - packages/db
        - packages/sync
        - packages/ingestion
        - packages/openclaw-worker
        - CI / build / tooling
        - docs
        - other
    validations:
      required: true

  - type: textarea
    id: env
    attributes:
      label: Environment
      description: Node version, OS, browser if applicable, etc.
      placeholder: |
        - Node: 20.11.0
        - OS: macOS 15.0
        - Browser: Chrome 130
    validations:
      required: false

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Console output, server logs, or screenshots. Paste in code fences.
    validations:
      required: false
