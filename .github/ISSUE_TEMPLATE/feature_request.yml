name: Feature request
description: Propose a new feature or improvement
title: "[feat]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for proposing an idea. Please describe the problem first,
        then the proposed solution — this helps us evaluate alternatives.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: |
        Describe the user need or the gap in current behavior. Skip
        implementation details for now.
      placeholder: As an operator, I can't ...
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: How would you like this to work? Be specific where you can.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you considered and why you didn't pick them.
    validations:
      required: false

  - type: dropdown
    id: surface
    attributes:
      label: Affected surface
      options:
        - apps/web (operator)
        - apps/web (citizen)
        - packages/db
        - packages/sync
        - packages/ingestion
        - packages/openclaw-worker
        - CI / build / tooling
        - docs
        - cross-cutting
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Links to discussions, screenshots, sketches, related issues.
    validations:
      required: false
