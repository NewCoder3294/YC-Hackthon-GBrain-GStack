name: PR validation

on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

concurrency:
  group: pr-validation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  semantic-title:
    name: Semantic PR title
    runs-on: ubuntu-latest
    steps:
      - name: Validate PR title is conventional-commit shaped
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            chore
            refactor
            test
            perf
            ci
            build
            revert
          requireScope: false
          subjectPattern: ^(?![A-Z]).+$
          subjectPatternError: |
            The PR title subject should start with a lowercase letter. Example: `feat(web): add live wall keyboard shortcuts`
